<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="options.css">
    <title>FB Publisher Settings</title>
  </head>
  <body>
    <main>
      <h1>FB Publisher Settings</h1>
      <label>

      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
