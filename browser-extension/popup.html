<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>FB Publisher</title>
  </head>
  <body>
    <main class="popup">
      <div class="header">
        <h1>FB Publisher</h1>
        <span id="statusDot" class="status-dot"></span>
      </div>

      <section class="summary">
        <p><span id="connectedText">Disconnected</span></p>
        <p>Profile: <strong id="profileName">-</strong></p>
        <p>Account: <strong id="accountName">-</strong></p>
        <p>Pages: <strong id="pagesText">-</strong></p>
      </section>

      <section class="actions">
        <button id="settingsButton" type="button">Settings</button>
        <button id="logsButton" type="button">Logs</button>
        <button id="adminHubButton" type="button" class="primary">Admin Hub</button>
        <button id="refreshButton" type="button" class="wide">Refresh Account</button>
      </section>

      <section id="logsPanel" class="logs hidden">
        <div class="logs-header">
          <strong>LOG:</strong>
          <button id="clearLogsButton" type="button">Clear</button>
        </div>
        <pre id="logsOutput"></pre>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
